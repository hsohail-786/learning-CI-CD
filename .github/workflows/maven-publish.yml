name: Learning github actions

on:
  push:
    branches:
      - master
    tags:
      - "v*"

  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Build with Maven
        run: mvn clean package -DskipTests

  deploy:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Configure Maven authentication
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>x-access-token</username>
                <password>${{ github.token }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Test GitHub Packages auth
        run: |
            TAG=${{ github.ref_name }}
            VERSION=${TAG#v}
            echo "Testing upload of version: $VERSION"
            curl -v \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/octet-stream" \
            --upload-file pom.xml \
            "https://maven.pkg.github.com/hsohail-786/learning-CI-CD/com/example/LearningMapStruct/$VERSION/LearningMapStruct-$VERSION.pom" \
            2>&1

      - name: Deploy to GitHub Packages
        run: |
                TAG=${{ github.ref_name }}
                VERSION=${TAG#v}
                echo "Deploying version: $VERSION"
                mvn clean deploy -DskipTests -Drevision=$VERSION -e
              env:
                GITHUB_TOKEN: ${{ github.token }}