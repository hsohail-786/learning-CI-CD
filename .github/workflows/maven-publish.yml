name: Learning github actions

on:
  push:
    branches:
      - master
    tags:
      - "v*"

  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Build with Maven
        run: mvn clean package -DskipTests

  deploy:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Configure Maven authentication
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>x-access-token</username>
                <password>${{ github.token }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Delete existing package version if exists
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          PACKAGE_VERSION_ID=$(curl -s \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/maven/com.example.LearningMapStruct/versions" \
            | jq -r ".[] | select(.name == \"$VERSION\") | .id")
          if [ -n "$PACKAGE_VERSION_ID" ]; then
            echo "Deleting existing version $VERSION (id: $PACKAGE_VERSION_ID)"
            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/user/packages/maven/com.example.LearningMapStruct/versions/$PACKAGE_VERSION_ID"
          else
            echo "No existing version $VERSION found, proceeding with deploy"
          fi

      - name: Deploy to GitHub Packages
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          echo "Deploying version: $VERSION"
          mvn clean deploy -DskipTests -Drevision=$VERSION -e
        env:
          GITHUB_TOKEN: ${{ github.token }}